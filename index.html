<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mine Oppskrifter</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#3b82d4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Oppskrifter" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: #f7f8fa;
      color: #1f2328;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; color: #1f2328; }
    header button {
      background: #3b82d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    header button:hover { background: #2f6bbf; }

    /* ── Layout ── */
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* ── Search ── */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-bar input {
      flex: 1;
      padding: 9px 13px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      color: #1f2328;
    }
    .search-bar input:focus { outline: none; border-color: #3b82d4; }

    /* ── Main ingredient filter bar ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
      min-height: 28px;
    }
    .filter-tag {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 3px 13px;
      font-size: 12px;
      cursor: pointer;
      color: #57606a;
      white-space: nowrap;
    }
    .filter-tag:hover { border-color: #3b82d4; color: #3b82d4; }
    .filter-tag.active { background: #3b82d4; border-color: #3b82d4; color: #fff; }

    /* ── Recipe grid ── */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .recipe-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .recipe-card:hover { border-color: #3b82d4; }

    .recipe-card .card-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      background: #f0f1f3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 13px;
    }
    .recipe-card .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .recipe-card .card-body { padding: 14px; }
    .recipe-card .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .recipe-card .card-meta { font-size: 12px; color: #57606a; line-height: 1.7; }
    .recipe-card .card-badge {
      display: inline-block;
      background: #eff6ff;
      color: #3b82d4;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .empty-state {
      text-align: center;
      color: #57606a;
      padding: 64px 0;
      grid-column: 1 / -1;
    }
    .empty-state p { margin-top: 8px; font-size: 14px; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 640px;
      padding: 28px 28px 24px;
      position: relative;
    }

    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal .close-btn {
      position: absolute;
      top: 16px;
      right: 18px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #57606a;
      line-height: 1;
    }
    .modal .close-btn:hover { color: #1f2328; }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #1f2328;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #1f2328;
      background: #fff;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus { outline: none; border-color: #3b82d4; }

    /* ── Image upload ── */
    .img-upload-area {
      border: 2px dashed #e5e7eb;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      color: #57606a;
      font-size: 13px;
      position: relative;
      transition: border-color 0.15s;
    }
    .img-upload-area:hover { border-color: #3b82d4; }
    .img-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      border: none;
      padding: 0;
    }
    .img-upload-area .upload-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }
    .img-upload-area .upload-preview img {
      height: 72px;
      width: 72px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    /* ── Ingredient list ── */
    .ingredient-list { display: flex; flex-direction: column; gap: 6px; }
    .ingredient-row {
      display: flex;
      gap: 6px;
    }
    .ingredient-row input { flex: 1; }
    .ingredient-row .remove-ing {
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 16px;
      cursor: pointer;
      color: #57606a;
      line-height: 1;
    }
    .ingredient-row .remove-ing:hover { border-color: #d33; color: #d33; }

    .add-ing-btn {
      margin-top: 6px;
      background: none;
      border: 1px dashed #3b82d4;
      color: #3b82d4;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .add-ing-btn:hover { background: #eff6ff; }

    /* ── Form actions ── */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-secondary {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
      color: #1f2328;
    }
    .btn-secondary:hover { background: #f7f8fa; }
    .btn-primary {
      background: #3b82d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #2f6bbf; }
    .btn-danger {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
      color: #c0392b;
    }
    .btn-danger:hover { background: #fdf2f2; border-color: #d33; }

    /* ── Detail view ── */
    .detail-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 18px;
      font-size: 13px;
      color: #57606a;
    }
    .detail-meta-row span { display: flex; align-items: center; gap: 4px; }

    .detail-gallery {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .detail-gallery img {
      height: 200px;
      flex: 1;
      min-width: 140px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }

    .detail-section { margin-bottom: 20px; }
    .detail-section h3 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #57606a;
      margin-bottom: 10px;
    }
    .detail-section ul {
      list-style: disc;
      padding-left: 20px;
      font-size: 14px;
      line-height: 1.8;
    }
    .detail-section p {
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<header>
  <h1>🍽 Mine Oppskrifter</h1>
  <button id="newRecipeBtn">+ Ny oppskrift</button>
</header>

<div class="container">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Søk etter oppskrift…" />
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="recipe-grid" id="recipeGrid"></div>
</div>

<!-- ═══ FORM MODAL ═══ -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <button class="close-btn" id="closeFormBtn">✕</button>
    <div class="modal-title" id="formTitle">Ny oppskrift</div>

    <div class="form-group">
      <label for="fieldName">Rettens navn *</label>
      <input type="text" id="fieldName" placeholder="F.eks. Kjøttkaker i brun saus" />
    </div>

    <div class="form-group">
      <label for="fieldMainIng">Hovedingrediens</label>
      <input type="text" id="fieldMainIng" placeholder="F.eks. Laks, Kylling, Pasta…" />
    </div>

    <div class="form-group" style="display:flex; gap:12px;">
      <div style="flex:1;">
        <label for="fieldDate">Dato lagd</label>
        <input type="date" id="fieldDate" />
      </div>
      <div style="flex:1;">
        <label for="fieldLocation">Lokasjon</label>
        <input type="text" id="fieldLocation" placeholder="F.eks. Hjemme, Hytta…" />
      </div>
    </div>

    <div class="form-group">
      <label>Ingredienser</label>
      <div class="ingredient-list" id="ingredientList"></div>
      <button class="add-ing-btn" id="addIngBtn">+ Legg til ingrediens</button>
    </div>

    <div class="form-group">
      <label for="fieldInstructions">Instruksjoner</label>
      <textarea id="fieldInstructions" rows="7" placeholder="Fremgangsmåte…"></textarea>
    </div>

    <div class="form-group">
      <label>Bilder</label>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" multiple />
        <div id="uploadHint">Klikk eller dra bilder hit</div>
        <div class="upload-preview" id="uploadPreview"></div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-danger" id="deleteBtn" style="display:none;">Slett</button>
      <button class="btn-secondary" id="cancelBtn">Avbryt</button>
      <button class="btn-primary" id="saveBtn">Lagre</button>
    </div>
  </div>
</div>

<!-- ═══ DETAIL MODAL ═══ -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="close-btn" id="closeDetailBtn">✕</button>
    <div class="modal-title" id="detailTitle"></div>

    <div class="detail-meta-row" id="detailMeta"></div>

    <div class="detail-gallery" id="detailGallery"></div>

    <div class="detail-section" id="detailIngSection">
      <h3>Ingredienser</h3>
      <ul id="detailIngList"></ul>
    </div>

    <div class="detail-section" id="detailInstSection">
      <h3>Instruksjoner</h3>
      <p id="detailInstructions"></p>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" id="editFromDetailBtn">Rediger</button>
      <button class="btn-secondary" id="closeDetailActionBtn">Lukk</button>
    </div>
  </div>
</div>

<script>
  // ── Storage helpers ──────────────────────────────────────────────────────
  const STORAGE_KEY = 'oppskrifter_v1';

  function loadRecipes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveRecipes(recipes) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function formatDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d}.${m}.${y}`;
  }

  // ── State ────────────────────────────────────────────────────────────────
  let recipes = loadRecipes();
  let editingId = null;
  let pendingImages = [];
  let detailRecipeId = null;
  let activeIngFilter = null; // currently selected main ingredient filter

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const recipeGrid      = document.getElementById('recipeGrid');
  const searchInput     = document.getElementById('searchInput');
  const filterBar       = document.getElementById('filterBar');
  const newRecipeBtn    = document.getElementById('newRecipeBtn');

  const formModal       = document.getElementById('formModal');
  const formTitle       = document.getElementById('formTitle');
  const closeFormBtn    = document.getElementById('closeFormBtn');
  const cancelBtn       = document.getElementById('cancelBtn');
  const saveBtn         = document.getElementById('saveBtn');
  const deleteBtn       = document.getElementById('deleteBtn');
  const fieldName       = document.getElementById('fieldName');
  const fieldMainIng    = document.getElementById('fieldMainIng');
  const fieldDate       = document.getElementById('fieldDate');
  const fieldLocation   = document.getElementById('fieldLocation');
  const fieldInstr      = document.getElementById('fieldInstructions');
  const ingredientList  = document.getElementById('ingredientList');
  const addIngBtn       = document.getElementById('addIngBtn');
  const fileInput       = document.getElementById('fileInput');
  const uploadPreview   = document.getElementById('uploadPreview');
  const uploadHint      = document.getElementById('uploadHint');

  const detailModal     = document.getElementById('detailModal');
  const closeDetailBtn  = document.getElementById('closeDetailBtn');
  const closeDetailAct  = document.getElementById('closeDetailActionBtn');
  const editFromDetail  = document.getElementById('editFromDetailBtn');
  const detailTitle     = document.getElementById('detailTitle');
  const detailMeta      = document.getElementById('detailMeta');
  const detailGallery   = document.getElementById('detailGallery');
  const detailIngList   = document.getElementById('detailIngList');
  const detailInstr     = document.getElementById('detailInstructions');
  const detailIngSec    = document.getElementById('detailIngSection');
  const detailInstSec   = document.getElementById('detailInstSection');

  // ── Render filter bar ─────────────────────────────────────────────────────
  function renderFilterBar() {
    const mains = [...new Set(recipes.map(r => r.mainIngredient).filter(Boolean))].sort();
    filterBar.innerHTML = '';
    if (!mains.length) return;

    const allTag = document.createElement('button');
    allTag.className = 'filter-tag' + (activeIngFilter === null ? ' active' : '');
    allTag.textContent = 'Alle';
    allTag.addEventListener('click', () => { activeIngFilter = null; renderFilterBar(); renderGrid(searchInput.value); });
    filterBar.appendChild(allTag);

    mains.forEach(ing => {
      const tag = document.createElement('button');
      tag.className = 'filter-tag' + (activeIngFilter === ing ? ' active' : '');
      tag.textContent = ing;
      tag.addEventListener('click', () => {
        activeIngFilter = activeIngFilter === ing ? null : ing;
        renderFilterBar();
        renderGrid(searchInput.value);
      });
      filterBar.appendChild(tag);
    });
  }

  // ── Render grid ──────────────────────────────────────────────────────────
  function renderGrid(filter = '') {
    const q = filter.toLowerCase();
    const filtered = recipes.filter(r => {
      const matchText = r.name.toLowerCase().includes(q);
      const matchIng  = activeIngFilter === null || (r.mainIngredient || '').toLowerCase() === activeIngFilter.toLowerCase();
      return matchText && matchIng;
    });

    recipeGrid.innerHTML = '';

    const noResults = filter || activeIngFilter;
    if (filtered.length === 0) {
      recipeGrid.innerHTML = `
        <div class="empty-state">
          <strong>${noResults ? 'Ingen oppskrifter funnet.' : 'Ingen oppskrifter ennå.'}</strong>
          <p>${noResults ? 'Prøv et annet søkeord eller filter.' : 'Trykk «+ Ny oppskrift» for å komme i gang.'}</p>
        </div>`;
      return;
    }

    filtered.forEach(recipe => {
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.dataset.id = recipe.id;

      const imgHTML = recipe.images && recipe.images.length
        ? `<div class="card-img"><img src="${recipe.images[0]}" alt="${recipe.name}" /></div>`
        : `<div class="card-img">Ingen bilde</div>`;

      const ingCount = recipe.ingredients ? recipe.ingredients.filter(i => i.trim()).length : 0;
      const badgeHTML = recipe.mainIngredient ? `<div class="card-badge">${escHtml(recipe.mainIngredient)}</div>` : '';
      const metaParts = [];
      if (recipe.date) metaParts.push(formatDate(recipe.date));
      if (recipe.location) metaParts.push(escHtml(recipe.location));
      metaParts.push(`${ingCount} ingrediens${ingCount !== 1 ? 'er' : ''}`);

      card.innerHTML = `
        ${imgHTML}
        <div class="card-body">
          ${badgeHTML}
          <div class="card-title">${escHtml(recipe.name)}</div>
          <div class="card-meta">${metaParts.join(' · ')}</div>
        </div>`;

      card.addEventListener('click', () => openDetail(recipe.id));
      recipeGrid.appendChild(card);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Form helpers ─────────────────────────────────────────────────────────
  function addIngredientRow(value = '') {
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    row.innerHTML = `
      <input type="text" placeholder="F.eks. 500g kjøttdeig" value="${escHtml(value)}" />
      <button class="remove-ing" title="Fjern">✕</button>`;
    row.querySelector('.remove-ing').addEventListener('click', () => row.remove());
    ingredientList.appendChild(row);
  }

  function getIngredients() {
    return Array.from(ingredientList.querySelectorAll('input')).map(i => i.value.trim()).filter(Boolean);
  }

  function refreshUploadPreview() {
    uploadPreview.innerHTML = '';
    pendingImages.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      uploadPreview.appendChild(img);
    });
    uploadHint.style.display = pendingImages.length ? 'none' : '';
  }

  // ── Open / close form ────────────────────────────────────────────────────
  function openForm(id = null) {
    editingId = id;
    pendingImages = [];
    ingredientList.innerHTML = '';
    fieldName.value = '';
    fieldMainIng.value = '';
    fieldDate.value = '';
    fieldLocation.value = '';
    fieldInstr.value = '';
    fileInput.value = '';
    refreshUploadPreview();

    if (id) {
      const r = recipes.find(x => x.id === id);
      formTitle.textContent = 'Rediger oppskrift';
      deleteBtn.style.display = '';
      fieldName.value = r.name;
      fieldMainIng.value = r.mainIngredient || '';
      fieldDate.value = r.date || '';
      fieldLocation.value = r.location || '';
      fieldInstr.value = r.instructions || '';
      (r.ingredients || []).forEach(i => addIngredientRow(i));
      pendingImages = r.images ? [...r.images] : [];
      refreshUploadPreview();
    } else {
      formTitle.textContent = 'Ny oppskrift';
      deleteBtn.style.display = 'none';
      addIngredientRow();
    }

    formModal.classList.add('open');
    fieldName.focus();
  }

  function closeForm() {
    formModal.classList.remove('open');
    editingId = null;
  }

  // ── Open / close detail ──────────────────────────────────────────────────
  function openDetail(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    detailRecipeId = id;

    detailTitle.textContent = r.name;

    // Meta row (main ingredient, date, location)
    detailMeta.innerHTML = '';
    if (r.mainIngredient) {
      const s = document.createElement('span');
      s.innerHTML = `<strong>Hovedingrediens:</strong> ${escHtml(r.mainIngredient)}`;
      detailMeta.appendChild(s);
    }
    if (r.date) {
      const s = document.createElement('span');
      s.innerHTML = `<strong>Dato:</strong> ${formatDate(r.date)}`;
      detailMeta.appendChild(s);
    }
    if (r.location) {
      const s = document.createElement('span');
      s.innerHTML = `<strong>Lokasjon:</strong> ${escHtml(r.location)}`;
      detailMeta.appendChild(s);
    }
    detailMeta.style.display = detailMeta.children.length ? '' : 'none';

    // Gallery
    detailGallery.innerHTML = '';
    if (r.images && r.images.length) {
      r.images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = r.name;
        detailGallery.appendChild(img);
      });
      detailGallery.style.display = '';
    } else {
      detailGallery.style.display = 'none';
    }

    // Ingredients
    const ings = (r.ingredients || []).filter(Boolean);
    if (ings.length) {
      detailIngList.innerHTML = ings.map(i => `<li>${escHtml(i)}</li>`).join('');
      detailIngSec.style.display = '';
    } else {
      detailIngSec.style.display = 'none';
    }

    // Instructions
    if (r.instructions && r.instructions.trim()) {
      detailInstr.textContent = r.instructions;
      detailInstSec.style.display = '';
    } else {
      detailInstSec.style.display = 'none';
    }

    detailModal.classList.add('open');
  }

  function closeDetail() {
    detailModal.classList.remove('open');
    detailRecipeId = null;
  }

  // ── Save ─────────────────────────────────────────────────────────────────
  function handleSave() {
    const name = fieldName.value.trim();
    if (!name) { fieldName.focus(); fieldName.style.borderColor = '#d33'; return; }
    fieldName.style.borderColor = '';

    const recipe = {
      id: editingId || uid(),
      name,
      mainIngredient: fieldMainIng.value.trim(),
      date: fieldDate.value,
      location: fieldLocation.value.trim(),
      ingredients: getIngredients(),
      instructions: fieldInstr.value.trim(),
      images: [...pendingImages],
      updatedAt: Date.now(),
    };

    if (editingId) {
      const idx = recipes.findIndex(x => x.id === editingId);
      if (idx !== -1) recipes[idx] = recipe;
    } else {
      recipes.unshift(recipe);
    }

    saveRecipes(recipes);
    closeForm();
    renderFilterBar();
    renderGrid(searchInput.value);
  }

  // ── Delete ───────────────────────────────────────────────────────────────
  function handleDelete() {
    if (!editingId) return;
    if (!confirm('Vil du slette denne oppskriften?')) return;
    recipes = recipes.filter(x => x.id !== editingId);
    saveRecipes(recipes);
    closeForm();
    closeDetail();
    renderFilterBar();
    renderGrid(searchInput.value);
  }

  // ── File input ───────────────────────────────────────────────────────────
  fileInput.addEventListener('change', () => {
    const files = Array.from(fileInput.files);
    if (!files.length) return;

    let loaded = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        pendingImages.push(e.target.result);
        loaded++;
        if (loaded === files.length) refreshUploadPreview();
      };
      reader.readAsDataURL(file);
    });
    fileInput.value = ''; // allow re-selecting same file
  });

  // ── Event listeners ──────────────────────────────────────────────────────
  newRecipeBtn.addEventListener('click', () => openForm());
  closeFormBtn.addEventListener('click', closeForm);
  cancelBtn.addEventListener('click', closeForm);
  saveBtn.addEventListener('click', handleSave);
  deleteBtn.addEventListener('click', handleDelete);
  addIngBtn.addEventListener('click', () => addIngredientRow());

  closeDetailBtn.addEventListener('click', closeDetail);
  closeDetailAct.addEventListener('click', closeDetail);
  editFromDetail.addEventListener('click', () => {
    const id = detailRecipeId;
    closeDetail();
    openForm(id);
  });

  searchInput.addEventListener('input', () => renderGrid(searchInput.value));

  // Close modals on overlay click
  formModal.addEventListener('click', e => { if (e.target === formModal) closeForm(); });
  detailModal.addEventListener('click', e => { if (e.target === detailModal) closeDetail(); });

  // ── Init ─────────────────────────────────────────────────────────────────
  renderFilterBar();
  renderGrid();

  // ── Service Worker ────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
